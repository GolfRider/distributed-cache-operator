apiVersion: v1
kind: ServiceAccount
metadata:
  name: cache-cli-demo
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cache-cli-demo
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cache-cli-demo
  namespace: default
subjects:
  - kind: ServiceAccount
    name: cache-cli-demo
    namespace: default
roleRef:
  kind: Role
  name: cache-cli-demo
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cache-cli-demo
  namespace: default
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: cache-cli-demo
      containers:
        - name: cache-cli
          image: cache-cli:dev
          imagePullPolicy: IfNotPresent
          args:
            - --name
            - orders-cache
            - info