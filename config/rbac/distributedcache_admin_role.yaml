# This rule is not used by the project distributed-cache-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over cache.sk1.services.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: distributed-cache-operator
    app.kubernetes.io/managed-by: kustomize
  name: distributedcache-admin-role
rules:
- apiGroups:
  - cache.sk1.services.com
  resources:
  - distributedcaches
  verbs:
  - '*'
- apiGroups:
  - cache.sk1.services.com
  resources:
  - distributedcaches/status
  verbs:
  - get
