# This rule is not used by the project distributed-cache-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the cache.sk1.services.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: distributed-cache-operator
    app.kubernetes.io/managed-by: kustomize
  name: distributedcache-editor-role
rules:
- apiGroups:
  - cache.sk1.services.com
  resources:
  - distributedcaches
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.sk1.services.com
  resources:
  - distributedcaches/status
  verbs:
  - get
