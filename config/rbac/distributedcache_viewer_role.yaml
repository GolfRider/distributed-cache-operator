# This rule is not used by the project distributed-cache-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to cache.sk1.services.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: distributed-cache-operator
    app.kubernetes.io/managed-by: kustomize
  name: distributedcache-viewer-role
rules:
- apiGroups:
  - cache.sk1.services.com
  resources:
  - distributedcaches
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cache.sk1.services.com
  resources:
  - distributedcaches/status
  verbs:
  - get
