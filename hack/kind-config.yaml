# hack/kind-config.yaml
# Disables kind's default CNI (kindnet) so we can install Calico instead.
# Calico enforces NetworkPolicy; kindnet does not. Required for the
# tenant-isolation NetworkPolicy in this operator to actually take effect.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"   # Calico's default expected pod CIDR
nodes:
  - role: control-plane